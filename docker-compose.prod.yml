# Production override — API secrets via SSM, direct RDS access.
#
# Usage on EC2 (HTTP-only, no domain):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# To add TLS later, layer docker-compose.tls.yml on top:
#   export DOMAIN=yourdomain.com
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tls.yml up -d --build

services:
  api:
    environment:
      - APP_ENV=prod
      - USE_SSM=1
      - QUANTDB_HOST=quantdb-cluster.cluster-c2pnphmnxjwr.ap-southeast-1.rds.amazonaws.com
      - QUANTDB_PORT=5432
