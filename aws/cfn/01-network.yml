AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Quant Strategies — Network layer.
  Security groups for EC2 (web + SSH) and Aurora (Postgres from EC2 only).
  Uses the default VPC; does not create a new one.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to create security groups in (default VPC)

  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: >-
      CIDR allowed to SSH into the EC2 instance.
      Restrict to your IP in production (e.g. 203.0.113.10/32).
    AllowedPattern: '^\d{1,3}(\.\d{1,3}){3}/\d{1,2}$'

  Project:
    Type: String
    Default: quant

Resources:
  # ── EC2 security group ──────────────────────────────────────────────
  Ec2Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${Project} - EC2 web + SSH"
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${Project}-ec2-sg"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (LetsEncrypt + redirect)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS

  # ── RDS security group ──────────────────────────────────────────────
  # Only accepts Postgres connections from the EC2 security group.
  RdsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${Project} - Aurora Postgres from EC2 only"
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${Project}-rds-sg"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref Ec2Sg
          Description: Postgres from EC2

Outputs:
  Ec2SecurityGroupId:
    Value: !Ref Ec2Sg
    Export:
      Name: !Sub "${Project}-ec2-sg-id"

  RdsSecurityGroupId:
    Value: !Ref RdsSg
    Export:
      Name: !Sub "${Project}-rds-sg-id"
