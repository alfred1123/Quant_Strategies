name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "tests/**"
      - ".github/skills/**"
      - ".github/instructions/**"
      - ".cursor/**"

  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

  deploy:
    name: deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSM Run Command
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Run deploy script on EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --timeout-seconds 300 \
            --parameters commands='[
              "cd /opt/quant",
              "git -c safe.directory=/opt/quant fetch origin main",
              "git -c safe.directory=/opt/quant reset --hard origin/main",
              "docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans",
              "docker image prune -f"
            ]' \
            --query Command.CommandId \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Poll until complete
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
              --query Status --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
                --query StandardOutputContent --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
                --query StandardErrorContent --output text
              exit 1
            fi
          done

          echo "Timed out waiting for deploy"
          exit 1
