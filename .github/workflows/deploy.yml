name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "tests/**"
      - ".github/skills/**"
      - ".github/instructions/**"
      - ".cursor/**"

  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

  build:
    name: build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  deploy:
    name: deploy to EC2
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSM Run Command
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Run deploy script on EC2
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --timeout-seconds 600 \
            --parameters commands='[
              "cd /opt/quant",
              "git fetch origin main",
              "git reset --hard origin/main",
              "docker builder prune -af",
              "docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans",
              "docker image prune -f"
            ]' \
            --query Command.CommandId \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Poll for up to ~10 min. Distinguish three outcomes:
          #   * aws CLI error            → print stderr, retry (don't mask)
          #   * Status in (Pending, InProgress, Delayed) → keep waiting
          #   * Status == Success                       → exit 0
          #   * Status in (Failed, TimedOut, Cancelled) → exit 1
          #
          # The previous version did `... 2>/dev/null || echo "Pending"`,
          # which silently swallowed real CLI errors and caused the loop
          # to print "Pending" forever — even after EC2 had finished
          # successfully. Surfacing stderr is critical for diagnosis.
          MAX_ATTEMPTS=60
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            sleep 10
            INVOCATION=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --output json 2>&1) || {
              # InvocationDoesNotExist is normal for the first ~15s — keep
              # waiting. Anything else, surface and keep retrying so a
              # transient blip doesn't fail the deploy.
              if echo "$INVOCATION" | grep -q "InvocationDoesNotExist"; then
                echo "Attempt $i: invocation not yet visible to SSM"
              else
                echo "Attempt $i: aws CLI error (will retry):"
                echo "$INVOCATION" | sed 's/^/    /'
              fi
              continue
            }

            STATUS=$(echo "$INVOCATION" | jq -r .Status)
            echo "Attempt $i: $STATUS"

            case "$STATUS" in
              Success)
                echo "── Deploy succeeded ──"
                echo "$INVOCATION" | jq -r .StandardOutputContent | tail -50
                exit 0
                ;;
              Failed|TimedOut|Cancelled)
                echo "── Deploy failed: $STATUS ──"
                echo "stdout:"
                echo "$INVOCATION" | jq -r .StandardOutputContent | tail -50
                echo "stderr:"
                echo "$INVOCATION" | jq -r .StandardErrorContent | tail -50
                exit 1
                ;;
            esac
          done

          echo "Timed out after $MAX_ATTEMPTS polls — deploy may still be running on EC2"
          exit 1
